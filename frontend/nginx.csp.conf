# nginx.csp.conf
# ─────────────────────────────────────────────────────────────────────────────
# NGINX — PatchTicker Frontend CSP & Security Headers
#
# This file documents the Content-Security-Policy and related headers that
# must be set by Nginx (or Caddy/Apache) when serving the frontend in production.
#
# The Vite dev server sets equivalent headers at runtime (vite.config.js).
# Keep both files in sync — FRONTEND_CSP in vite.config.js is the
# single source of truth; copy it here verbatim when updating.
#
# HOW TO USE
# ───────────
# Include this file inside your server {} block:
#
#   server {
#     ...
#     include /path/to/nginx.csp.conf;
#     ...
#   }
#
# Or paste the add_header directives directly into your server block.
#
# WHAT EACH DIRECTIVE DOES
# ─────────────────────────
#
#   default-src 'none'
#     Deny everything not explicitly listed. The policy fails closed —
#     new resource types are blocked until explicitly whitelisted.
#
#   script-src 'self'
#     Only ES module bundles from the same origin (/assets/*.js).
#     No 'unsafe-inline' → inline <script> and event handlers (onclick=)
#     are blocked even if injected by XSS.
#     No 'unsafe-eval' → eval(), new Function(), setTimeout("...") blocked.
#
#   style-src 'self' https://fonts.googleapis.com
#     Our Vite CSS bundle (/assets/*.css) + Google Fonts stylesheet.
#     No 'unsafe-inline' → style="" attributes blocked even if XSS-injected.
#     This is the key win: CSS injection for data exfiltration is blocked.
#
#   font-src 'self' https://fonts.gstatic.com
#     Vite-bundled fonts + Google Fonts binary files (.woff2).
#     fonts.gstatic.com serves the actual font files referenced in the
#     fonts.googleapis.com stylesheet.
#
#   connect-src 'self'
#     fetch() and XHR only to the same origin. /api/* calls go to the
#     backend via Nginx proxy_pass. No external API calls from the browser.
#
#   img-src 'self' data:
#     Same-origin images + data: URIs. No external image hotlinking.
#
#   frame-ancestors 'none'
#     This page cannot be embedded in any iframe anywhere.
#     Prevents clickjacking.
#
#   form-action 'self'
#     <form> submissions may only target the same origin.
#     Belt-and-suspenders: the app uses fetch(), but the policy must still
#     be explicit so form injection attacks don't circumvent it.
#
#   base-uri 'self'
#     <base href="..."> can only point to the same origin.
#     Prevents base-tag injection from hijacking all relative URLs.
#
#   object-src 'none'
#     No Flash, ActiveX, or other plugins.
#
#   upgrade-insecure-requests
#     Browser automatically upgrades http:// resource loads to https://.
#
# ─────────────────────────────────────────────────────────────────────────────

# ── Content-Security-Policy ───────────────────────────────────────────────────
# always — send on ALL responses including error pages (4xx/5xx).
# If you add a new resource domain, update vite.config.js FRONTEND_CSP too.

add_header Content-Security-Policy "
  default-src 'none';
  script-src 'self';
  style-src 'self' https://fonts.googleapis.com;
  font-src 'self' https://fonts.gstatic.com;
  connect-src 'self';
  img-src 'self' data:;
  frame-ancestors 'none';
  form-action 'self';
  base-uri 'self';
  object-src 'none';
  upgrade-insecure-requests
" always;

# ── Frame protection ──────────────────────────────────────────────────────────
# Belt-and-suspenders with frame-ancestors 'none' in CSP.
# Old browsers that don't implement CSP still respect X-Frame-Options.

add_header X-Frame-Options "DENY" always;

# ── MIME sniffing ─────────────────────────────────────────────────────────────
# Prevent browser from guessing MIME type (e.g. treating JSON as script).

add_header X-Content-Type-Options "nosniff" always;

# ── Referrer ──────────────────────────────────────────────────────────────────
# Full URL for same-origin requests.
# Only origin (no path/query) for cross-origin HTTPS→HTTPS.
# Nothing for HTTPS→HTTP.

add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── Permissions ───────────────────────────────────────────────────────────────
# Disable browser features the app doesn't use.

add_header Permissions-Policy "
  camera=(),
  microphone=(),
  geolocation=(),
  payment=(),
  usb=(),
  fullscreen=(self)
" always;

# ── HSTS ──────────────────────────────────────────────────────────────────────
# Tell browsers to always use HTTPS for this domain.
# max-age=31536000 = 1 year. includeSubDomains = all subdomains.
# preload = submit to browser preload lists (requires careful consideration).
# Only set this when you are certain HTTPS is stable for the domain.

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;


